<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Reading about ASYNC JS</h1>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
        <li>6</li>
        <li>7</li>
        <li>8</li>
        <li>9</li>
        <li>10</li>
    </ul>
    <button id="start">START</button>
    <button id="stop">STOP</button>
</body>

<script>
    function remove (){
           const liList= document.querySelector('li')
           if(liList) liList.remove();
        } 

    let intervalId;
    const stop= document.querySelector('#start').addEventListener('click',function(){
        intervalId=setInterval(remove,1500)
    })

    document.querySelector('#stop').addEventListener('click',function(){
        clearInterval(intervalId)
    })
</script>
</html>
